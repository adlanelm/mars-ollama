services:
  # ─────────────────────────────────────────────────────────────
  # OLLAMA
  # ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    pull_policy: always
    mem_limit: 28g
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_THREADS=16
      - OLLAMA_VULKAN=0
      #- HSA_OVERRIDE_GFX_VERSION=10.3.0
      - OLLAMA_KV_CACHE_TYPE="q8_0"
      - ROCR_VISIBLE_DEVICES=0
      - HIP_VISIBLE_DEVICES=0
      - OLLAMA_DEBUG=1
      - OLLAMA_NEW_ENGINE=True
      - OLLAMA_NEW_ESTIMATES=True
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_ORIGINS="moz-extension://*"
    ports:
      - "11434:11434" # Ollama API at http://localhost:11434
    volumes:
      - $HOME/llm/ollama/data:/root/.ollama:Z,U
    networks:
      - ollama
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    restart: always
    privileged: true
    security_opt:
      - seccomp:unconfined

  docling:
    image: quay.io/docling-project/docling-serve-cpu:latest
    container_name: docling
    ports:
      - "5001:5001"
    environment:
      UVICORN_WORKERS: "1"
      DOCLING_SERVE_ENABLE_REMOTE_SERVICES: "true"
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_MAX_SYNC_WAIT: "3600"
      DOCLING_SERVE_LOG_LEVEL: DEBUG
      DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG: "true"
    networks:
      - ollama

  docling-proxy:
    image: python:3.12-slim
    container_name: docling-proxy
    working_dir: /app
    volumes:
      - ./docling_proxy.py:/app/docling_proxy.py:ro
    command: >
      sh -lc "pip install --no-cache-dir fastapi uvicorn httpx python-multipart
      && python /app/docling_proxy.py"
    environment:
      DOCLING_BASE_URL: http://docling:5001
      OLLAMA_CHAT_URL: http://ollama:11434/v1/chat/completions
      OLLAMA_MODEL: hf.co/ibm-granite/granite-docling-258M-GGUF:latest
      OLLAMA_TIMEOUT: "180"
      OLLAMA_TEMPERATURE: "0.0"
      OLLAMA_MAX_TOKENS: "8192"
      DOCLING_PIPELINE: vlm
      PROXY_STRIP_STANDARD_OCR: "true"
      PROXY_DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      - docling
      - ollama
    networks:
      - ollama

networks:
  openwebui:
  ollama:

volumes:
  openwebui_data:
  comfyui_data:
  hf-hub-cache:
