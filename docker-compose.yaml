  docling-proxy:
    build:
      context: ./docling-proxy
      dockerfile: Dockerfile.docling-proxy
    container_name: docling-proxy
    ports:
      - "8000:8080"
    environment:
      DOCLING_PROXY_MAX_PAGES_PER_PART: 50
      DOCLING_PROXY_MAX_CONCURRENCY: 1
      DOCLING_PROXY_UVICORN_WORKERS: 1
      DOCLING_PROXY_LOCAL_DOCLING_WORKERS: 1
      DOCLING_PROXY_POLL_INTERVAL_SEC: 2
      DOCLING_PROXY_LOCAL_DOCLING_STARTUP_TIMEOUT_SEC: 120
      DOCLING_PROXY_LOCAL_DOCLING_REQUEST_TIMEOUT_SEC: 36000
      DOCLING_SERVE_ENABLE_UI: "false"
      DOCLING_SERVE_ENABLE_REMOTE_SERVICES: "true"
      DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "false"
      DOCLING_SERVE_MAX_SYNC_WAIT: "36000"
      DOCLING_SERVE_MAX_DOCUMENT_TIMEOUT: "864000"
      DOCLING_SERVE_MAX_FILE_SIZE: "1073741824"
      DOCLING_SERVE_LOG_LEVEL: INFO
      DOCLING_SERVE_ALLOW_CUSTOM_CODE_FORMULA_CONFIG: "true"
      DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG: "true"
      DOCLING_SERVE_ALLOW_CUSTOM_PICTURE_DESCRIPTION_CONFIG: "true"
      DOCLING_SERVE_SCRATCH_PATH: /tmp/docling-serve
      GPU_MAX_HEAP_SIZE: 80
      PYTORCH_ALLOC_CONF: "expandable_segments:True"
      TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL: 1
      DOCLING_SERVE_OCR_BATCH_SIZE: 2
      DOCLING_SERVE_LAYOUT_BATCH_SIZE: 2
      DOCLING_SERVE_TABLE_BATCH_SIZE: 2
      DOCLING_PERF_PAGE_BATCH_SIZE: 4
      DOCLING_DEBUG_PROFILE_PIPELINE_TIMINGS: "true"
      DOCLING_NUM_THREADS: 16
      DOCLING_SERVE_ENABLE_MANAGEMENT_ENDPOINTS: "false"
      DOCLING_SERVE_ARTIFACTS_PATH:
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    restart: always
    privileged: true
    security_opt:
      - seccomp:unconfined
    networks:
      - ollama

networks:
  ollama:

volumes:
  hf-hub-cache:
