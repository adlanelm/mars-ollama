services:
  # ─────────────────────────────────────────────────────────────
  # OLLAMA
  # ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    pull_policy: always
    mem_limit: 28g
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_THREADS=16
      - OLLAMA_VULKAN=0
      #- HSA_OVERRIDE_GFX_VERSION=10.3.0
      - OLLAMA_KV_CACHE_TYPE="q8_0"
      - ROCR_VISIBLE_DEVICES=0
      - HIP_VISIBLE_DEVICES=0
      - OLLAMA_DEBUG=1
      - OLLAMA_NEW_ENGINE=True
      - OLLAMA_NEW_ESTIMATES=True
      - OLLAMA_KEEP_ALIVE=30m0s
      - OLLAMA_ORIGINS="moz-extension://*"
    ports:
      - "11434:11434" # Ollama API at http://localhost:11434
    volumes:
      - $HOME/llm/ollama/data:/root/.ollama:Z,U
    networks:
      - ollama
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    restart: always
    privileged: true
    security_opt:
      - seccomp:unconfined

  arbiter:
    build:
      context: ./arbiter
      dockerfile: Dockerfile
    container_name: llm-arbiter
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      VLLM_BASE_URL: http://127.0.0.1:8000
      #VLLM_API_KEY:
      VLLM_COMMAND: >-
        vllm serve "Qwen/Qwen3-Reranker-0.6B"
        --host 127.0.0.1
        --port 8000
        --runner pooling
        --chat-template /app/templates/qwen3_reranker.jinja
        --hf-overrides '{"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
        --gpu-memory-utilization 0.92
        --cpu-offload-gb 16
        --kv-offloading-size 8
        --kv-offloading-backend native
        --disable-hybrid-kv-cache-manager
      #      VLLM_COMMAND: >-
      #        vllm serve tomaarsen/Qwen3-Reranker-0.6B-seq-cls
      #        --host 127.0.0.1
      #        --port 8000
      #        --runner pooling
      #        --gpu-memory-utilization 0.92
      #        --cpu-offload-gb 16
      #        --kv-offloading-size 8
      #        --kv-offloading-backend native
      LOG_LEVEL: INFO
      HUGGING_FACE_HUB_TOKEN: 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 #${HUGGING_FACE_HUB_TOKEN}
    volumes:
      - $HOME/llm/hf_cache:/root/.cache/huggingface:Z,U
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    networks:
      - ollama

