services:
  # ─────────────────────────────────────────────────────────────
  # OLLAMA
  # ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    pull_policy: always
    mem_limit: 28g
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_THREADS=16
      - OLLAMA_VULKAN=0
      #- HSA_OVERRIDE_GFX_VERSION=10.3.0
      - OLLAMA_KV_CACHE_TYPE="q8_0"
      - ROCR_VISIBLE_DEVICES=0
      - HIP_VISIBLE_DEVICES=0
      - OLLAMA_DEBUG=1
      - OLLAMA_NEW_ENGINE=True
      - OLLAMA_NEW_ESTIMATES=True
      - OLLAMA_KEEP_ALIVE=5
      - OLLAMA_ORIGINS="moz-extension://*"
    ports:
      - "11434:11434" # Ollama API at http://localhost:11434
    volumes:
      - $HOME/llm/ollama/data:/root/.ollama:Z,U
    networks:
      - ollama
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    restart: always
    privileged: true
    security_opt:
      - seccomp:unconfined

